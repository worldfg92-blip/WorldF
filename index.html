<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldFG - Connect With The World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue: #1877f2;
            --green: #42b72a;
            --red: #e41e3f;
            --yellow: #f7b928;
            --bg: #f0f2f5;
            --white: #ffffff;
            --text: #1c1e21;
            --gray: #65676b;
            --border: #e4e6eb;
            --shadow: 0 1px 2px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh;
        }

        /* TOP NAVBAR */
        .topbar {
            background: var(--white);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 10px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: var(--blue);
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 20px;
            padding: 8px 16px;
            gap: 8px;
            flex: 1;
            max-width: 400px;
        }
        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            width: 100%;
        }
        .topbar-icons {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.2s;
        }
        .icon-btn:hover { background: #d8dadf; }
        .badge-dot {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background: var(--red);
            border-radius: 50%;
            border: 2px solid white;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .user-avatar:hover { border-color: var(--blue); }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            gap: 16px;
        }
        .sidebar-left {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 80px;
            height: fit-content;
        }
        .main-feed {
            flex: 1;
            max-width: 680px;
            min-width: 0;
        }
        .sidebar-right {
            width: 320px;
            flex-shrink: 0;
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        @media (max-width: 1100px) {
            .sidebar-left, .sidebar-right { display: none; }
            .main-feed { max-width: 100%; }
        }
        @media (max-width: 768px) {
            .search-box { display: none; }
            .logo-text { display: none; }
        }

        /* CARDS */
        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-pad { padding: 16px; }
        .section-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* CREATE POST */
        .create-post {}
        .post-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .post-textarea {
            flex: 1;
            background: var(--bg);
            border: 2px solid transparent;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
            min-height: 44px;
            transition: 0.2s;
            cursor: pointer;
        }
        .post-textarea:focus { border-color: var(--blue); background: white; }
        .post-textarea.expanded {
            border-radius: 12px;
            min-height: 80px;
            cursor: text;
        }
        .post-actions-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .post-action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            color: var(--gray);
            transition: 0.2s;
        }
        .post-action-btn:hover { background: #f0f2f5; }
        .submit-post-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .submit-post-btn:hover { background: #1664d9; }
        .media-preview-wrap {
            margin-top: 10px;
            position: relative;
            display: inline-block;
        }
        .media-preview-wrap img, .media-preview-wrap video {
            max-width: 250px;
            max-height: 250px;
            border-radius: 8px;
            object-fit: cover;
        }
        .remove-media-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 26px;
            height: 26px;
            background: var(--red);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        /* POST CARD */
        .post-card {}
        .post-top {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
            align-items: center;
        }
        .post-info { flex: 1; }
        .post-author {
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .post-author:hover { text-decoration: underline; }
        .verified-badge { color: var(--blue); font-size: 14px; }
        .post-meta { font-size: 12px; color: var(--gray); }
        .post-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 50%;
        }
        .post-delete-btn:hover { background: #f0f2f5; }
        .post-body { padding: 0 16px 10px; }
        .post-text-content {
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .post-media-content {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            cursor: pointer;
            margin-top: 8px;
        }
        .post-stats-bar {
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--gray);
        }
        .post-buttons-bar {
            display: flex;
            border-top: 1px solid var(--border);
            margin: 0 12px;
            padding: 4px 0;
        }
        .post-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.2s;
        }
        .post-btn:hover { background: #f0f2f5; }
        .post-btn.liked { color: var(--blue); }

        /* REACTIONS */
        .reactions-popup {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            background: white;
            border-radius: 20px;
            padding: 5px 10px;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            white-space: nowrap;
        }
        .reactions-popup button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            padding: 4px;
            transition: 0.15s;
        }
        .reactions-popup button:hover { transform: scale(1.3); }
        .reaction-btn-wrap {
            position: relative;
            flex: 1;
            display: flex;
        }

        /* COMMENTS */
        .comments-panel {
            display: none;
            padding: 10px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }
        .comment-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: white;
            border-radius: 8px;
        }
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .comment-bubble { flex: 1; }
        .comment-author { font-weight: 600; font-size: 12px; }
        .comment-text { font-size: 13px; word-break: break-word; }
        .comment-time { font-size: 11px; color: var(--gray); }
        .comment-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .comment-input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 13px;
            font-family: inherit;
            background: white;
        }
        .comment-input:focus { border-color: var(--blue); }
        .comment-send {
            background: var(--blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }

        /* SIDEBARS */
        .sidebar-card {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .sidebar-profile {
            text-align: center;
        }
        .sidebar-profile img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        .sidebar-profile h4 { margin-top: 8px; }
        .sidebar-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--gray);
        }
        .sidebar-stats div { text-align: center; }
        .sidebar-stats strong { display: block; color: var(--text); font-size: 16px; }
        .news-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .news-item:hover { background: #f9f9f9; margin: 0 -16px; padding: 8px 16px; }
        .news-item:last-child { border-bottom: none; }
        .news-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }
        .news-source {
            font-size: 11px;
            color: var(--gray);
        }
        .news-image {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 4px;
        }
        .trending-tag {
            display: inline-block;
            background: #e8f0fe;
            color: var(--blue);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
        }

        /* MARKETPLACE */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .market-item {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.2s;
        }
        .market-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .market-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .market-item-body { padding: 10px; }
        .market-price {
            font-size: 18px;
            font-weight: 800;
            color: var(--blue);
        }
        .market-title { font-weight: 600; font-size: 14px; margin: 3px 0; }
        .market-loc { font-size: 12px; color: var(--gray); }
        .boost-tag {
            background: var(--yellow);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            display: inline-block;
            margin-top: 3px;
        }

        /* LIVE */
        .live-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .live-card {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            aspect-ratio: 16/10;
        }
        .live-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .live-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--red);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 700;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .live-viewers {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 3px 8px;
            border-radius: 4px;
        }
        .live-name {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* CHAT */
        .chat-container {
            display: flex;
            height: calc(100vh - 120px);
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
        }
        .chat-sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .chat-search { padding: 10px; }
        .chat-search input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg);
            outline: none;
            font-size: 13px;
        }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-user:hover, .chat-user.active { background: #f0f2f5; }
        .chat-user img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-user-name { font-weight: 600; font-size: 13px; }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .chat-msgs {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--bg);
        }
        .msg-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
        }
        .msg-sent {
            align-self: flex-end;
            background: var(--blue);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-received {
            align-self: flex-start;
            background: #e4e6eb;
            border-bottom-left-radius: 4px;
        }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 3px; text-align: right; }
        .chat-input-bar {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .chat-input-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }
        .chat-send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--blue);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FRIENDS PAGE */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .friend-card {
            background: var(--white);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .friend-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        .friend-card h4 { margin: 8px 0 4px; font-size: 14px; }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: white;
            border-radius: 14px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-box h3 { margin-bottom: 16px; }
        .modal-box input, .modal-box textarea, .modal-box select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: inherit;
            background: var(--bg);
            outline: none;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        /* FULLSCREEN VIEWER */
        .fullscreen-viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .fullscreen-viewer img, .fullscreen-viewer video {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
        }
        .fullscreen-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 36px;
            cursor: pointer;
        }

        /* NOTIFICATIONS */
        .notif-item {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .notif-item:hover { background: #f9f9f9; }
        .notif-icon-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .notif-icon-circle.like { background: #e8f0fe; color: var(--blue); }
        .notif-icon-circle.comment { background: #e8f5e9; color: var(--green); }
        .notif-icon-circle.friend { background: #fff3e0; color: var(--yellow); }
        .notif-icon-circle.msg { background: #f3e5f5; color: #9c27b0; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        .empty-state i { font-size: 48px; margin-bottom: 10px; display: block; }

        .emoji-bar { display: flex; flex-wrap: wrap; gap: 2px; padding: 4px 0; }
        .emoji-bar button { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; transition: 0.15s; }
        .emoji-bar button:hover { background: #e4e6eb; transform: scale(1.2); }
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ==================== WORLD-FG COMPLETE SOCIAL PLATFORM ====================

// Database
const DB = {
    _get(k, d) { try { const v = localStorage.getItem('wfg_'+k); return v ? JSON.parse(v) : d; } catch(e) { return d; } },
    _set(k, v) { localStorage.setItem('wfg_'+k, JSON.stringify(v)); },
    get users() { return this._get('users', []); },
    set users(v) { this._set('users', v); },
    get session() { return this._get('session', null); },
    set session(v) { this._set('session', v); },
    get posts() { return this._get('posts', []); },
    set posts(v) { this._set('posts', v); },
    get friends() { return this._get('friends', []); },
    set friends(v) { this._set('friends', v); },
    get friendReqs() { return this._get('friendReqs', []); },
    set friendReqs(v) { this._set('friendReqs', v); },
    get messages() { return this._get('messages', []); },
    set messages(v) { this._set('messages', v); },
    get notifs() { return this._get('notifs', []); },
    set notifs(v) { this._set('notifs', v); },
    get market() { return this._get('market', []); },
    set market(v) { this._set('market', v); },
    get live() { return this._get('live', []); },
    set live(v) { this._set('live', v); },
    get verified() { return this._get('verified', []); },
    set verified(v) { this._set('verified', v); },
    get settings() { return this._get('settings', {notifs:true,privacy:'public',dark:false}); },

// Helpers
function U() { return DB.session ? DB.users.find(u=>u.id===DB.session.userId) : null; }
function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(ts) { const d=Date.now()-ts; const m=Math.floor(d/60000); if(m<1) return 'Just now'; if(m<60) return m+'m'; const h=Math.floor(m/60); if(h<24) return h+'h'; return Math.floor(h/24)+'d'; }
function isVerified(uid) { return DB.verified.includes(uid); }
function isFriend(uid) { return DB.friends.some(f=>(f.userId===U().id&&f.friendId===uid)||(f.userId===uid&&f.friendId===U().id)); }
function getFriendsList() { return DB.friends.filter(f=>f.userId===U().id).map(f=>f.friendId); }
function getUser(id) { return DB.users.find(u=>u.id===id); }
function addNotif(uid, msg, type) { if(!DB.settings.notifs) return; const n=DB.notifs; n.unshift({id:Date.now(),userId:uid,message:msg,type:type,time:new Date().toLocaleString(),read:false}); DB.notifs=n; }

// Actions
function login(email, pw) { const u=DB.users.find(x=>x.email===email&&x.password===pw); if(u){DB.session={userId:u.id};return true;} return false; }
function register(data) { if(DB.users.find(x=>x.email===data.email)) return false; const users=DB.users; users.push({id:Date.now(),...data,avatar:'https://i.pravatar.cc/200?u='+Date.now(),cover:'https://picsum.photos/900/300?random='+Date.now(),joined:new Date().toISOString()}); DB.users=users; return true; }
function logout() { DB.session=null; currentChatUser=null; render(); }
function createPost(text, media, mediaType) { const p=DB.posts; p.unshift({id:Date.now(),userId:U().id,text,media,mediaType,reactions:{},comments:[],time:Date.now()}); DB.posts=p; }
function deletePost(pid) { DB.posts=DB.posts.filter(p=>p.id!==pid); }
function reactPost(pid, emoji) { const p=DB.posts; const post=p.find(x=>x.id===pid); if(post){post.reactions[U().id]=emoji; DB.posts=p;} }
function addComment(pid, text) { const p=DB.posts; const post=p.find(x=>x.id===pid); if(post&&text.trim()){post.comments.push({userId:U().id,name:U().name,text:text.trim(),time:Date.now()}); DB.posts=p;} }
function sendMsg(toId, text) { if(!text.trim()) return; const m=DB.messages; m.push({id:Date.now(),from:U().id,to:toId,text:text.trim(),time:Date.now()}); DB.messages=m; addNotif(toId, '💬 New message from '+U().name, 'msg'); }
function getChatMsgs(otherId) { return DB.messages.filter(m=>(m.from===U().id&&m.to===otherId)||(m.from===otherId&&m.to===U().id)).sort((a,b)=>a.time-b.time); }
function sendFriendReq(toId) { if(isFriend(toId)||U().id===toId) return; if(DB.friendReqs.some(r=>r.from===U().id&&r.to===toId)) return; DB.friendReqs=[...DB.friendReqs,{id:Date.now(),from:U().id,to:toId}]; addNotif(toId, U().name+' sent you a friend request 🤝', 'friend'); }
function acceptReq(rid) { const r=DB.friendReqs.find(x=>x.id===rid); if(r&&r.to===U().id){DB.friends=[...DB.friends,{userId:r.from,friendId:r.to},{userId:r.to,friendId:r.from}]; DB.friendReqs=DB.friendReqs.filter(x=>x.id!==rid); addNotif(r.from, U().name+' accepted your friend request ✅', 'friend');} }
function rejectReq(rid) { DB.friendReqs=DB.friendReqs.filter(x=>x.id!==rid); }
function boostListing(lid) { const m=DB.market; const l=m.find(x=>x.id===lid); if(l){l.boosted=true;DB.market=m;alert('🚀 Listing boosted!');} }
function createListing(title, price, loc, cat) { const m=DB.market; m.unshift({id:Date.now(),userId:U().id,title,price,location:loc,category:cat,image:'https://picsum.photos/seed/'+Date.now()+'/400/300',boosted:false,time:Date.now()}); DB.market=m; }
function requestVerification() { if(isVerified(U().id)) return alert('Already verified!'); DB.verified=[...DB.verified,U().id]; alert('✅ You are now verified!'); }
function startLive() { const t=prompt('Stream title:'); if(t){const l=DB.live;l.push({id:Date.now(),userId:U().id,title:t,thumbnail:U().avatar,viewers:Math.floor(Math.random()*50),time:Date.now()});DB.live=l;alert('🔴 LIVE now!');} }
function updateProfile(data) { const u=DB.users; const cu=u.find(x=>x.id===U().id); if(data.name)cu.name=data.name; cu.bio=data.bio||''; cu.location=data.location||''; cu.marital=data.marital||''; cu.dob=data.dob||''; DB.users=u; }

function renderAuth() {
    document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px;">
        <div style="background:white;border-radius:16px;padding:40px;max-width:430px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="text-align:center;margin-bottom:24px;">
                <div style="width:60px;height:60px;background:#1877f2;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:28px;font-weight:800;">W</div>
                <h1 style="margin-top:12px;color:#1877f2;">WorldFG</h1>
                <p style="color:#65676b;">Connect with friends and the world 🌍</p>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:16px;">
                <button id="showLoginTab" class="btn" style="flex:1;background:#1877f2;color:white;border:none;padding:10px;border-radius:6px;cursor:pointer;font-weight:600;">Login</button>
                <button id="showRegTab" class="btn" style="flex:1;background:#e4e6eb;color:black;border:none;padding:10px;border-radius:6px;cursor:pointer;font-weight:600;">Sign Up</button>
            </div>
            <div id="authForm"></div>
            <div id="authMsg" style="text-align:center;margin-top:10px;font-size:13px;"></div>
        </div>
    </div>`;
    
    function showLogin() {
        document.getElementById('showLoginTab').style.background='#1877f2'; document.getElementById('showLoginTab').style.color='white';
        document.getElementById('showRegTab').style.background='#e4e6eb'; document.getElementById('showRegTab').style.color='black';
        document.getElementById('authForm').innerHTML = `
            <input id="loginEmail" placeholder="Email address" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;">
            <input id="loginPass" type="password" placeholder="Password" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:15px;">
            <button onclick="doLogin()" style="width:100%;padding:12px;background:#1877f2;color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">🔓 Log In</button>
            <p style="text-align:center;margin-top:12px;font-size:12px;color:#65676b;">Demo: test@test.com / 123456</p>
        `;
    }
    
    function showRegister() {
        document.getElementById('showRegTab').style.background='#1877f2'; document.getElementById('showRegTab').style.color='white';
        document.getElementById('showLoginTab').style.background='#e4e6eb'; document.getElementById('showLoginTab').style.color='black';
        document.getElementById('authForm').innerHTML = `
            <input id="regName" placeholder="Full Name" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;">
            <input id="regEmail" placeholder="Email address" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;">
            <input id="regPass" type="password" placeholder="Password (6+ characters)" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;">
            <input id="regLoc" placeholder="Location (city)" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:15px;">
            <button onclick="doRegister()" style="width:100%;padding:12px;background:#42b72a;color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">✨ Create Account</button>
        `;
    }
    
    document.getElementById('showLoginTab').onclick = showLogin;
    document.getElementById('showRegTab').onclick = showRegister;
    showLogin();
    
    window.doLogin = function() {
        if(login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value)) {
            render();
        } else {
            document.getElementById('authMsg').innerHTML = '<span style="color:#e41e3f;">❌ Invalid email or password</span>';
        }
    };
    
    window.doRegister = function() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pw = document.getElementById('regPass').value;
        const loc = document.getElementById('regLoc').value;
        if(!name||!email||!pw) { document.getElementById('authMsg').innerHTML='<span style="color:#e41e3f;">❌ Name, email, and password required</span>'; return; }
        if(pw.length<6) { document.getElementById('authMsg').innerHTML='<span style="color:#e41e3f;">❌ Password must be 6+ characters</span>'; return; }
        if(register({name,email,password:pw,bio:'',location:loc||'Unknown',marital:'',dob:''})) {
            document.getElementById('authMsg').innerHTML='<span style="color:#42b72a;">✅ Account created! Please login.</span>';
            setTimeout(showLogin, 1500);
        } else {
            document.getElementById('authMsg').innerHTML='<span style="color:#e41e3f;">❌ Email already exists</span>';
        }
    };
}

};

function attachEvents() {
    if(currentPage==='messenger'&&currentChatUser) scrollChat();
    document.addEventListener('click', function(e) {
        if(!e.target.closest('#searchResults') && !e.target.closest('#globalSearch')) {
            const results = document.getElementById('searchResults');
            if(results) results.style.display='none';
        }
    });
}
