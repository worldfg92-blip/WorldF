<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldFG - Connect With The World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1877f2;
            --primary-hover: #1664d9;
            --success: #42b72a;
            --danger: #e41e3f;
            --warning: #f7b928;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --hover-bg: #f2f2f2;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ===== TOP NAVBAR (Facebook Style) ===== */
        .fb-navbar {
            background: var(--card);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 10px;
        }
        .fb-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .fb-logo-circle {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 800;
        }
        .fb-logo-text { font-size: 24px; font-weight: 800; color: var(--primary); }
        
        .fb-search {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 50px;
            padding: 0 16px;
            height: 40px;
            gap: 8px;
            flex: 1;
            max-width: 350px;
            min-width: 200px;
        }
        .fb-search i { color: var(--text-secondary); font-size: 14px; }
        .fb-search input {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            width: 100%;
            font-family: inherit;
        }
        
        .fb-nav-center {
            display: flex;
            gap: 2px;
            height: 100%;
        }
        .fb-nav-tab {
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            position: relative;
        }
        .fb-nav-tab:hover { background: var(--hover-bg); color: var(--text); }
        .fb-nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .fb-nav-tab .tab-label { display: none; font-size: 13px; font-weight: 600; margin-left: 6px; }
        
        .fb-nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .fb-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.2s;
            color: var(--text);
        }
        .fb-icon-btn:hover { background: #d8dadf; }
        .fb-badge {
            position: absolute;
            top: 2px;
            right: 4px;
            min-width: 18px;
            height: 18px;
            background: var(--danger);
            color: white;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .fb-user-pic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .fb-user-pic:hover { border-color: var(--primary); }

        /* ===== MAIN LAYOUT ===== */
        .fb-container {
            display: flex;
            max-width: 1440px;
            margin: 0 auto;
            padding: 16px;
            gap: 16px;
        }
        .fb-sidebar-left {
            width: 300px;
            flex-shrink: 0;
            position: sticky;
            top: 72px;
            height: fit-content;
            max-height: calc(100vh - 90px);
            overflow-y: auto;
        }
        .fb-main-feed {
            flex: 1;
            max-width: 680px;
            min-width: 0;
        }
        .fb-sidebar-right {
            width: 320px;
            flex-shrink: 0;
            position: sticky;
            top: 72px;
            height: fit-content;
            max-height: calc(100vh - 90px);
            overflow-y: auto;
        }
        @media (max-width: 1200px) { .fb-sidebar-right { display: none; } }
        @media (max-width: 900px) { 
            .fb-sidebar-left { display: none; } 
            .fb-nav-tab .tab-label { display: none; }
            .fb-logo-text { display: none; }
            .fb-main-feed { max-width: 100%; }
        }

        /* ===== CARDS ===== */
        .fb-card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .fb-card-pad { padding: 16px; }
        .fb-section-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== CREATE POST (Facebook Style) ===== */
        .fb-create-post { }
        .fb-create-post-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .fb-avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .fb-post-input {
            flex: 1;
            background: var(--bg);
            border: 2px solid transparent;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .fb-post-input:hover { background: #e4e6eb; }
        .fb-post-expanded { margin-top: 10px; }
        .fb-post-textarea {
            width: 100%;
            background: var(--bg);
            border: 2px solid transparent;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            transition: 0.2s;
        }
        .fb-post-textarea:focus { border-color: var(--primary); background: white; }
        .fb-post-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            align-items: center;
            flex-wrap: wrap;
        }
        .fb-post-action {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            transition: 0.2s;
            min-width: 80px;
        }
        .fb-post-action:hover { background: var(--hover-bg); }
        .fb-post-action.camera-btn:hover { color: #e41e3f; }
        .fb-post-action.photo-btn:hover { color: #45bd62; }
        .fb-post-action.video-btn:hover { color: #1877f2; }
        .fb-post-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .fb-post-submit:hover { background: var(--primary-hover); }
        .fb-media-preview {
            margin-top: 10px;
            position: relative;
            display: inline-block;
        }
        .fb-media-preview img, .fb-media-preview video {
            max-width: 250px;
            max-height: 250px;
            border-radius: 8px;
            object-fit: cover;
        }
        .fb-remove-media {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 28px;
            height: 28px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== POST CARD ===== */
        .fb-post {}
        .fb-post-header {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
            align-items: center;
        }
        .fb-post-info { flex: 1; }
        .fb-post-author {
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .fb-post-author:hover { text-decoration: underline; }
        .fb-verified-icon { color: var(--primary); font-size: 14px; }
        .fb-post-meta { font-size: 12px; color: var(--text-secondary); }
        .fb-post-body { padding: 0 16px 10px; }
        .fb-post-text {
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .fb-post-media {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            cursor: pointer;
            margin-top: 8px;
            border-radius: 0;
        }
        .fb-post-stats {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .fb-post-buttons {
            display: flex;
            border-top: 1px solid var(--border);
            margin: 0 12px;
            padding: 4px 0;
        }
        .fb-post-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
        }
        .fb-post-btn:hover { background: var(--hover-bg); }
        .fb-post-btn.liked { color: var(--primary); }
        
        .fb-reactions-popup {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 0;
            background: white;
            border-radius: 25px;
            padding: 6px 12px;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            white-space: nowrap;
            gap: 4px;
        }
        .fb-reactions-popup button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 28px;
            padding: 4px 6px;
            transition: 0.15s;
            border-radius: 8px;
        }
        .fb-reactions-popup button:hover { transform: scale(1.4); background: #f0f2f5; }
        .fb-reaction-wrap { position: relative; flex: 1; display: flex; }

        /* ===== COMMENTS ===== */
        .fb-comments-panel {
            display: none;
            padding: 10px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }
        .fb-comment {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: white;
            border-radius: 8px;
        }
        .fb-comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .fb-comment-content { flex: 1; }
        .fb-comment-name { font-weight: 600; font-size: 12px; }
        .fb-comment-text { font-size: 13px; word-break: break-word; }
        .fb-comment-time { font-size: 10px; color: var(--text-secondary); }
        .fb-comment-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .fb-comment-input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 50px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 13px;
            font-family: inherit;
            background: white;
        }
        .fb-comment-input:focus { border-color: var(--primary); }
        .fb-comment-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        /* ===== SIDEBAR ===== */
        .fb-sidebar-card {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
        }
        .fb-sidebar-profile {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .fb-sidebar-profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid #e4e6eb;
        }
        .fb-sidebar-profile h4 { margin-top: 8px; font-size: 16px; }
        .fb-shortcut {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 8px;
            padding: 8px;
            transition: 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        .fb-shortcut:hover { background: var(--hover-bg); }
        .fb-shortcut-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .fb-news-item {
            padding: 8px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }
        .fb-news-item:hover { background: var(--hover-bg); padding: 8px; }
        .fb-news-thumb {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .fb-news-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .fb-news-source { font-size: 11px; color: var(--text-secondary); }
        .fb-trending-tag {
            display: inline-block;
            background: #e8f0fe;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 2px;
            cursor: pointer;
            font-weight: 500;
        }

        /* ===== MARKETPLACE ===== */
        .fb-market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .fb-market-item {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: 0.2s;
        }
        .fb-market-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .fb-market-item img { width: 100%; height: 170px; object-fit: cover; }
        .fb-market-body { padding: 12px; }
        .fb-market-price { font-size: 20px; font-weight: 800; color: var(--primary); }
        .fb-market-title { font-weight: 600; font-size: 14px; margin: 4px 0; }
        .fb-market-loc { font-size: 12px; color: var(--text-secondary); }
        .fb-boost-badge {
            background: var(--warning);
            color: #000;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
        }

        /* ===== LIVE ===== */
        .fb-live-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .fb-live-card {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            aspect-ratio: 16/10;
        }
        .fb-live-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }
        .fb-live-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--danger);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            animation: fb-pulse 1.5s infinite;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        @keyframes fb-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .fb-live-viewers {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 6px;
        }
        .fb-live-name {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* ===== CHAT ===== */
        .fb-chat-layout {
            display: flex;
            height: calc(100vh - 100px);
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .fb-chat-list-panel {
            width: 330px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .fb-chat-search-wrap { padding: 10px; }
        .fb-chat-search-wrap input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg);
            outline: none;
            font-size: 13px;
            font-family: inherit;
        }
        .fb-chat-list { flex: 1; overflow-y: auto; }
        .fb-chat-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .fb-chat-user:hover, .fb-chat-user.active { background: #e8f0fe; }
        .fb-chat-user img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .fb-chat-user-name { font-weight: 600; font-size: 14px; }
        .fb-chat-main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .fb-chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
        }
        .fb-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg);
        }
        .fb-msg {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
        }
        .fb-msg-sent {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .fb-msg-received {
            align-self: flex-start;
            background: #e4e6eb;
            border-bottom-left-radius: 4px;
        }
        .fb-msg-time { font-size: 10px; opacity: 0.7; margin-top: 3px; text-align: right; }
        .fb-chat-input-wrap {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .fb-chat-input-wrap input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }
        .fb-chat-send {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== FRIENDS ===== */
        .fb-friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .fb-friend-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            text-align: center;
            transition: 0.2s;
        }
        .fb-friend-card:hover { box-shadow: var(--shadow-md); }
        .fb-friend-card-cover {
            height: 80px;
            background-size: cover;
            background-position: center;
        }
        .fb-friend-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: -40px;
            border: 3px solid white;
            cursor: pointer;
        }
        .fb-friend-card h4 { margin: 6px 0 2px; font-size: 14px; }
        .fb-friend-card p { font-size: 11px; color: var(--text-secondary); padding: 0 10px; }

        /* ===== MODALS ===== */
        .fb-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fb-fadeIn 0.2s;
        }
        @keyframes fb-fadeIn { from{opacity:0} to{opacity:1} }
        .fb-modal-box {
            background: white;
            border-radius: 14px;
            width: 100%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        .fb-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            border-radius: 14px 14px 0 0;
        }
        .fb-modal-header h3 { font-size: 18px; }
        .fb-modal-close {
            width: 36px;
            height: 36px;

        <div class="fb-section-title">😂 Funny Videos</div>

function renderCurrentPage() {
    switch(currentPage) {
        case 'feed': return renderFeed();
        case 'live': return renderLive();
        case 'marketplace': return renderMarketplace();
        case 'messenger': return renderMessenger();
        case 'friends': return renderFriends();
        case 'notifications': return renderNotifications();
        case 'profile': return renderProfile();
        default: return renderFeed();
    }
}

function renderFeed() {
    const user = U();
    const friendsList = getFriendsList();
    const feedPosts = DB.posts.filter(p => p.userId===user.id || friendsList.includes(p.userId)).sort((a,b)=>b.time-a.time);
    
    const mediaHtml = pendingMediaData ? `
    <div class="fb-media-preview">
        ${pendingMediaType==='image'?`<img src="${pendingMediaData}">`:`<video src="${pendingMediaData}" controls></video>`}
        <button class="fb-remove-media" onclick="clearPending()">✕</button>
    </div>` : '';
    
    return `
    <div class="fb-card fb-create-post fb-card-pad">
        <div class="fb-create-post-top">
            <img src="${user.avatar}" class="fb-avatar-sm" onclick="navTo('profile')">
            <input class="fb-post-input" id="postInput" placeholder="What's on your mind, ${esc(user.name)}? 😊" onclick="expandComposer()" readonly>
        </div>
        <div id="composerExpanded" style="display:${composerExpanded?'block':'none'};">
            <div class="fb-post-expanded">
                <textarea class="fb-post-textarea" id="postText" placeholder="Share something with your network..."></textarea>
                ${emojiBar('postText')}
                ${mediaHtml}
                <div class="fb-post-actions">
                    <button class="fb-post-action camera-btn" onclick="openCamera()">📷 Camera</button>
                    <button class="fb-post-action photo-btn" onclick="pickMedia('image')">🖼️ Photo</button>
                    <button class="fb-post-action video-btn" onclick="pickMedia('video')">🎬 Video</button>
                    <button class="fb-post-submit" onclick="submitPost()">Post</button>
                </div>
            </div>
        </div>
        <input type="file" id="mediaPicker" accept="image/*,video/*" style="display:none;" onchange="handleMediaPick(event)">
    </div>
    <div id="feedContainer">
        ${feedPosts.length===0?`<div class="fb-card fb-card-pad fb-empty-state"><i>📭</i><h3>No posts yet</h3><p>Connect with friends to see their posts!</p></div>`:feedPosts.map(p=>renderPost(p)).join('')}
    </div>`;
}

function renderPost(post) {
    const author = getUser(post.userId);
    if (!author) return '';
    const myReact = post.reactions[U().id] || '';
    const reactCount = Object.keys(post.reactions).length;
    
    return `
    <div class="fb-card fb-post" id="post-${post.id}">
        <div class="fb-post-header">
            <img src="${author.avatar}" class="fb-avatar-sm" onclick="viewProfile(${author.id})">
            <div class="fb-post-info">
                <div class="fb-post-author" onclick="viewProfile(${author.id})">${esc(author.name)} ${isVerified(author.id)?'<span class="fb-verified-icon">✅</span>':''}</div>
                <div class="fb-post-meta">${timeAgo(post.time)} · 📍 ${esc(author.location||'')}</div>
            </div>
            ${post.userId===U().id?`<button onclick="deleteMyPost(${post.id})" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:50%;">🗑️</button>`:''}
        </div>
        ${post.text?`<div class="fb-post-body"><div class="fb-post-text">${esc(post.text)}</div></div>`:''}
        ${post.media?`${post.mediaType==='image'?`<img src="${post.media}" class="fb-post-media" onclick="viewFull('${post.media}','image')">`:`<video src="${post.media}" class="fb-post-media" controls></video>`}`:''}
        <div class="fb-post-stats">
            <span>${myReact||'👍'} ${reactCount} reactions</span>
            <span>💬 ${post.comments.length} comments</span>
        </div>
        <div class="fb-post-buttons">
            <div class="fb-reaction-wrap">
                <button class="fb-post-btn" onclick="toggleReactions(${post.id})">${myReact||'👍'} React</button>
                <div class="fb-reactions-popup" id="reactions-${post.id}">
                    ${REACTIONS.map(r=>`<button onclick="doReact(${post.id},'${r}');event.stopPropagation();">${r}</button>`).join('')}
                </div>
            </div>
            <button class="fb-post-btn" onclick="toggleComments(${post.id})">💬 Comment</button>
            <button class="fb-post-btn" onclick="sharePost(${post.id})">🔄 Share</button>
        </div>
        <div class="fb-comments-panel" id="comments-${post.id}">
            ${post.comments.map(c=>`
                <div class="fb-comment">
                    <img src="${(getUser(c.userId)||{}).avatar||'https://i.pravatar.cc/32?u=x'}" class="fb-comment-avatar">
                    <div class="fb-comment-content">
                        <div class="fb-comment-name">${esc(c.name)}</div>
                        <div class="fb-comment-text">${esc(c.text)}</div>
                        <div class="fb-comment-time">${timeAgo(c.time)}</div>
                    </div>
                </div>
            `).join('')}
            <div class="fb-comment-form">
                <input class="fb-comment-input" id="cmt-${post.id}" placeholder="Write a comment..." onkeypress="if(event.key==='Enter')submitComment(${post.id})">
                <button class="fb-comment-send" onclick="submitComment(${post.id})">Post</button>
            </div>
            ${emojiBar('cmt-'+post.id)}
        </div>
    </div>`;
}

function renderLive() {
    const streams = DB.live;
    return `
    <div class="fb-card fb-card-pad">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">

            <button class="fb-btn fb-btn-danger" onclick="startLive()">🎥 Go Live</button>

        <div class="fb-live-grid">
            ${streams.length===0?`<div class="fb-empty-state"><i>📡</i><h3>No live streams</h3><p>Be the first to go live!</p></div>`:streams.map(s=>{
                const streamer = getUser(s.userId);
                return `<div class="fb-live-card" onclick="joinLive(${s.id})">

                </div>`;
            }).join('')}
        </div>
    </div>`;
}

            ${items.length===0?`<div class="fb-empty-state"><i>🏪</i><h3>No listings</h3><p>Be the first to sell!</p></div>`:items.map(m=>{
                const seller = getUser(m.userId);
                return `<div class="fb-market-item">
                    <img src="${m.image}" onerror="this.src='https://picsum.photos/400/300'">
                    <div class="fb-market-body">
                        <div class="fb-market-price">💰 $${esc(m.price)}</div>

                            ${!m.boosted?`<button class="fb-btn fb-btn-gray" style="font-size:11px;padding:4px 8px;" onclick="boostListing(${m.id});render();">🚀 Boost</button>`:''}

                    </div>

function renderMessenger() {
    const friends = getFriendsList();
    const friendUsers = DB.users.filter(u=>friends.includes(u.id)&&u.id!==U().id);
    const chatUser = currentChatUserId ? getUser(currentChatUserId) : null;
    const msgs = currentChatUserId ? getChatMsgs(currentChatUserId) : [];
    
    return `
    <div class="fb-chat-layout">
        <div class="fb-chat-list-panel">
            <div class="fb-chat-search-wrap"><input type="text" placeholder="🔍 Search chats..." id="chatSearch" oninput="filterChatList()"></div>
            <div class="fb-chat-list" id="chatList">
                ${friendUsers.length===0?`<div class="fb-empty-state"><p>No friends to chat</p></div>`:friendUsers.map(f=>`
                    <div class="fb-chat-user ${currentChatUserId===f.id?'active':''}" onclick="openChat(${f.id})">
                        <img src="${f.avatar}"><span class="fb-chat-user-name">${esc(f.name)}</span>
                    </div>
                `).join('')}
            </div>
        </div>
        <div class="fb-chat-main-panel">
            ${chatUser?`
                <div class="fb-chat-header"><img src="${chatUser.avatar}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;"> ${esc(chatUser.name)} ${isVerified(chatUser.id)?'✅':''}</div>
                <div class="fb-chat-messages" id="chatMessages">
                    ${msgs.length===0?`<div class="fb-empty-state"><p>Say hello! 👋</p></div>`:msgs.map(m=>`
                        <div class="fb-msg ${m.from===U().id?'fb-msg-sent':'fb-msg-received'}">${esc(m.text)}<div class="fb-msg-time">${timeAgo(m.time)}</div></div>
                    `).join('')}
                </div>
                <div class="fb-chat-input-wrap">
                    <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button class="fb-chat-send" onclick="sendChat()">➤</button>
                </div>
                ${emojiBar('msgInput')}
            `:`<div class="fb-empty-state" style="flex:1;display:flex;align-items:center;justify-content:center;"><i>💬</i><h3>Select a friend to chat</h3></div>`}
        </div>
    </div>`;
}

function renderFriends() {
    const all = DB.users.filter(u=>u.id!==U().id);
    const friends = getFriendsList();
    const pending = DB.friendReqs.filter(r=>r.to===U().id);
    return `
    <div class="fb-card fb-card-pad" style="margin-bottom:14px;">
        <div class="fb-section-title">📨 Friend Requests (${pending.length})</div>
        ${pending.length===0?`<p style="color:var(--text-secondary);">No pending requests</p>`:pending.map(r=>{
            const from = getUser(r.from);
            return from?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
                <img src="${from.avatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                <span style="flex:1;font-weight:600;">${esc(from.name)}</span>
                <button class="fb-btn fb-btn-primary" style="font-size:12px;" onclick="acceptReq(${r.id});render();">✅ Accept</button>
                <button class="fb-btn fb-btn-gray" style="font-size:12px;" onclick="rejectReq(${r.id});render();">❌</button>
            </div>`:'';
        }).join('')}
    </div>
    <div class="fb-card fb-card-pad">
        <div class="fb-section-title">👥 Discover People</div>
        <input type="text" placeholder="🔍 Search by name or location..." class="fb-input" style="margin-bottom:12px;border-radius:50px;" id="friendSearch" oninput="filterFriends()">
        <div class="fb-friends-grid" id="friendsGrid">
            ${all.map(u=>`
                <div class="fb-friend-card" data-search="${esc(u.name).toLowerCase()} ${esc(u.location||'').toLowerCase()}">
                    <div class="fb-friend-card-cover" style="background-image:url('${u.cover||''}');"></div>
                    <img src="${u.avatar}" onclick="viewProfile(${u.id})">
                    <h4>${esc(u.name)} ${isVerified(u.id)?'✅':''}</h4>
                    <p>📍 ${esc(u.location||'Unknown')}</p>
                    <div style="padding:8px;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;">
                        ${friends.includes(u.id)?`<button class="fb-btn fb-btn-gray" style="font-size:11px;padding:4px 8px;" disabled>✓ Friends</button>`:`<button class="fb-btn fb-btn-primary" style="font-size:11px;padding:4px 8px;" onclick="sendFriendReq(${u.id});this.innerText='Sent';this.disabled=true;">🤝 Add</button>`}
                        <button class="fb-btn fb-btn-gray" style="font-size:11px;padding:4px 8px;" onclick="openChat(${u.id})">💬 Chat</button>
                    </div>
                </div>
            `).join('')}
        </div>
    </div>`;
}

    DB.notifs = DB.notifs.map(n=>n.userId===U().id?{...n,read:true}:n);
    return `
    <div class="fb-card">
        <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">
            <div class="fb-section-title">🔔 Notifications</div>
            <button class="fb-btn fb-btn-gray" style="font-size:12px;" onclick="DB.notifs=DB.notifs.filter(n=>n.userId!==U().id);render();">Clear All</button>
        </div>
        ${notifs.length===0?`<div class="fb-empty-state"><i>🔕</i><p>No notifications</p></div>`:notifs.map(n=>`
            <div class="fb-notif-item">
                <div class="fb-notif-icon ${n.type}">${n.type==='like'?'❤️':n.type==='comment'?'💬':n.type==='friend'?'🤝':n.type==='msg'?'💬':'🔔'}</div>

            </div>
        `).join('')}
    </div>`;
}

        } else {

    };
    
    window.doRegAction = function() {
        const n=document.getElementById('regName').value, e=document.getElementById('regEmail').value, p=document.getElementById('regPass').value, l=document.getElementById('regLoc').value;

        } else {
            document.getElementById('authError').innerHTML='<span style="color:var(--danger);">❌ Email already exists</span>';
        }
    };
    
    showLoginForm();
}

// ===== CAMERA MODAL =====
function openCamera() {
    const modal = document.createElement('div'); modal.className='fb-modal';
    modal.innerHTML = `
    <div class="fb-modal-box" style="max-width:650px;">
        <div class="fb-modal-header"><h3>📷 Take a Selfie</h3><button class="fb-modal-close" onclick="stopCamera();this.closest('.fb-modal').remove();">✕</button></div>
        <div class="fb-modal-body">
            <div class="fb-camera-container">
                <video id="cameraVideo" autoplay playsinline></video>
                <canvas id="cameraCanvas"></canvas>
            </div>
            <div class="fb-filter-row">
                ${FILTERS.map(f=>`<button class="fb-filter-btn ${currentFilter===f.name?'active':''}" onclick="applyFilter('${f.name}')">${f.label}</button>`).join('')}
            </div>
            <div class="fb-camera-controls">
                <button class="fb-camera-capture" onclick="capturePhoto()"></button>
            </div>
        </div>
    </div>`;
    document.body.appendChild(modal);
    
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(stream => {
            cameraStream = stream;
            const video = document.getElementById('cameraVideo');
            video.srcObject = stream;
            video.style.filter = currentFilter === 'none' ? '' : FILTERS.find(f=>f.name===currentFilter)?.style || '';
        })
        .catch(() => alert('Camera access denied. Please allow camera permissions.'));
    
    modal.onclick = e => { if(e.target===modal) { stopCamera(); modal.remove(); } };
}

function applyFilter(filterName) {
    currentFilter = filterName;
    const video = document.getElementById('cameraVideo');
    if (video) {
        video.style.filter = filterName === 'none' ? '' : FILTERS.find(f=>f.name===filterName)?.style || '';
        document.querySelectorAll('.fb-filter-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.fb-filter-btn[onclick*="${filterName}"]`)?.classList.add('active');
    }
}

function capturePhoto() {
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');
    if (!video || !canvas) return;
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.filter = video.style.filter || 'none';
    ctx.drawImage(video, 0, 0);
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    pendingMediaData = dataUrl;
    pendingMediaType = 'image';
    composerExpanded = true;
    
    stopCamera();
    document.querySelector('.fb-modal')?.remove();
    render();
}

function stopCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(t=>t.stop());
        cameraStream = null;
    }
}
